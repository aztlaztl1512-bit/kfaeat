<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الفعل المضارع - أ/ عبدالعزيز الفيفي</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #1a237e; --secondary: #3949ab; --bg: #f0f2f5; --accent: #ff9800; --correct: #2e7d32; --wrong: #c62828; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .quiz-container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 750px; text-align: center; position: relative; overflow: hidden; }
        #timer-bar { position: absolute; top: 0; right: 0; height: 6px; background: var(--accent); width: 100%; transition: width 1s linear; border-radius: 15px 15px 0 0; }
        .option-btn { display: block; width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; background: white; cursor: pointer; transition: 0.3s; font-size: 1.1rem; font-weight: 500; font-family: inherit; }
        .correct-flash { background-color: #e8f5e9 !important; border-color: var(--correct) !important; color: var(--correct); border-width: 3px !important; }
        .wrong-flash { background-color: #ffebee !important; border-color: var(--wrong) !important; color: var(--wrong); }
        .hidden { display: none; }
        .section-tag { background: var(--primary); color: white; padding: 4px 15px; border-radius: 20px; font-size: 0.95rem; margin-bottom: 10px; display: inline-block; font-weight: bold; }
        .reading-text { background: #fffde7; padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: right; font-size: 1.1rem; border-right: 5px solid var(--accent); line-height: 1.8; color: #333; }
        input[type="text"] { width: 85%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 2px solid #ddd; font-size: 1rem; text-align: center; }
        .btn-start { background: var(--primary); color: white; padding: 12px 35px; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: bold; transition: 0.3s; }
        .btn-start:hover { background: var(--secondary); transform: scale(1.05); }
        #feedback { margin-top: 15px; font-weight: bold; font-size: 1.1rem; min-height: 1.5em; }
        #timer-text { font-weight: bold; color: var(--accent); margin-bottom: 10px; }
        .progress-text { font-size: 0.9rem; color: #666; margin-bottom: 5px; }
        .copyright { font-size: 0.85rem; color: #666; margin-top: 25px; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body onload="updateDateTime()">

<div class="quiz-container">
    <div id="timer-bar"></div>
    
    <div id="login-section">
        <h2 style="color: var(--primary);">تحدي الأفعال المضارعة وأدوات الشرط (36 سؤالاً) 💡</h2>
        <h4 style="margin-top: -10px; color: var(--secondary);">( المرفوع، المنصوب، المجزوم، والأفعال الخمسة )</h4>
        <div id="date-display" style="color: #e53e3e; font-weight: bold; margin-bottom: 15px;"></div>
        <input type="text" id="student-name" placeholder="أدخل اسمك الثلاثي لتبدأ...">
        <br>
        <button class="btn-start" onclick="startQuiz()">ابدأ التحدي العشوائي</button>
        <div class="copyright">أ/ <span class="normal-text">عبدالعزيز الفيفي</span> - ثانوية الأمير عبدالمجيد 🎓</div>
    </div>

    <div id="quiz-section" class="hidden">
        <div class="progress-text" id="q-progress">سؤال 1 من 36</div>
        <div id="timer-text">الوقت المتبقي: 45</div>
        <div id="section-label" class="section-tag"></div>
        <div id="reading-container" class="reading-text hidden"></div>
        <h2 id="question-text" style="margin: 15px 0; color: #333; font-size: 1.4rem;"></h2>
        <div id="options-container"></div>
        <div id="feedback"></div>
        <div class="copyright">أ/ <span class="normal-text">عبدالعزيز الفيفي</span> 🎓</div>
    </div>

    <div id="result-section" class="hidden">
        <h2 id="congrats-msg">تحليل النتيجة النهائية</h2>
        <h1 id="final-score" style="color: var(--primary); font-size: 3rem;"></h1>
        <p id="evaluation-text" style="font-weight: bold; margin-bottom: 20px;"></p>
        <button class="btn-start" onclick="location.reload()" style="background: linear-gradient(45deg, #1a237e, #3949ab); border-radius: 50px; padding: 15px 40px;">
            تحدي النفس بترتيب جديد 🔄
        </button>
        <p style="margin-top: 25px;">أ / <span class="normal-text">عبد العزيز الفيفي</span> - ثانوية الأمير عبدالمجيد</p>
    </div>
</div>

<script>
    function updateDateTime() {
        const today = new Date();
        const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', calendar: 'islamic-umalqura', numberingSystem: 'arabic' };
        document.getElementById('date-display').innerText = new Intl.DateTimeFormat('ar-SA', options).format(today);
    }

    const rawData = [
        // --- القسم 1: إكمال الفراغ ---
        { section: "إكمال الفراغ", q: "يُرفع الفعل المضارع (صحيح الآخر) بعلامة .......", options: ["الضمة الظاهرة", "الضمة المقدرة", "ثبوت النون", "الفتحة"], correct: "الضمة الظاهرة" },
        { section: "إكمال الفراغ", q: "ينصب الفعل المضارع إذا سبقته أداة نصب مثل .......", options: ["أنْ", "لمْ", "لا الناهية", "قد"], correct: "أنْ" },
        { section: "إكمال الفراغ", q: "الفعل (يسعى) مضارع معتل الآخر بـ .......", options: ["الألف", "الواو", "الياء", "النون"], correct: "الألف" },
        { section: "إكمال الفراغ", q: "الأفعال الخمسة ترفع وعلامة رفعها .......", options: ["ثبوت النون", "حذف النون", "الواو", "الألف"], correct: "ثبوت النون" },
        { section: "إكمال الفراغ", q: "يجزم الفعل المضارع المعتل الآخر وعلامة جزمه .......", options: ["حذف حرف العلة", "السكون", "حذف النون", "الكسرة"], correct: "حذف حرف العلة" },
        { section: "إكمال الفراغ", q: "من أدوات الشرط الجازمة التي تدل على العاقل هي .......", options: ["مَنْ", "مَا", "مَتَى", "أَيَّان"], correct: "مَنْ" },

        // --- القسم 2: التمثيل في جمل مفيدة ---
        { section: "التمثيل في جمل", q: "اختر الجملة التي تحتوي على مضارع منصوب:", options: ["يجب أن تذاكرَ بجد", "الطالب يذاكرُ بجد", "لم يذاكر الطالب", "ذاكر دروسك"], correct: "يجب أن تذاكرَ بجد" },
        { section: "التمثيل في جمل", q: "جملة تشتمل على أسلوب شرط جازم:", options: ["إن تذاكرْ تنجحْ", "لو تذاكر تنجح", "إذا ذاكرت تنجح", "لعلك تنجح"], correct: "إن تذاكرْ تنجحْ" },
        { section: "التمثيل في جمل", q: "مثل لجملة فيها مضارع مجزوم بـ (لم):", options: ["لم يتأخرْ محمد", "لا تتأخرْ يا محمد", "لن يتأخر محمد", "محمد لا يتأخرُ"], correct: "لم يتأخرْ محمد" },
        { section: "التمثيل في جمل", q: "اختر الجملة التي تحتوي على (أفعال خمسة) مرفوعة:", options: ["أنتم تعملون بإخلاص", "يجب أن تعملوا", "لم تعملوا اليوم", "العمال عملوا بجد"], correct: "أنتم تعملون بإخلاص" },
        { section: "التمثيل في جمل", q: "جملة تحتوي على مضارع (معتل الآخر بالواو) مرفوع:", options: ["المسلم يدعو ربه", "المسلم لن يدعوَ غير الله", "يدعو الطالب زميله", "يقضي القاضي بالعدل"], correct: "المسلم يدعو ربه" },
        { section: "التمثيل في جمل", q: "جملة تحتوي على أداة شرط للمكان:", options: ["أينما تذهبْ أذهبْ معك", "متى تسافرْ أسافرْ", "من يقرأْ يستفدْ", "ما تفعلْ تجده"], correct: "أينما تذهبْ أذهبْ معك" },

        // --- القسم 3: الإعراب ---
        { section: "الإعراب", q: "ما إعراب (تكتبوا) في: 'لن تكتبوا على الجدران'؟", options: ["مضارع منصوب بحذف النون", "مضارع مجزوم بحذف النون", "مضارع مرفوع بثبوت النون", "فعل أمر مبني"], correct: "مضارع منصوب بحذف النون" },
        { section: "الإعراب", q: "ما علامة جزم الفعل (يدع) في جملة 'لم يدعُ المؤمن لشر'؟", options: ["حذف حرف العلة", "السكون", "الضمة", "حذف النون"], correct: "حذف حرف العلة" },
        { section: "الإعراب", q: "إعراب الفعل (يشرحُ) في جملة 'المعلم يشرحُ الدرس':", options: ["مرفوع بالضمة الظاهرة", "منصوب بالفتحة", "مجزوم بالسكون", "مبني على الفتح"], correct: "مرفوع بالضمة الظاهرة" },
        { section: "الإعراب", q: "علامة نصب الفعل (يقضي) في 'لن يقضيَ' هي:", options: ["الفتحة الظاهرة", "الفتحة المقدرة", "حذف حرف العلة", "السكون"], correct: "الفتحة الظاهرة" },
        { section: "الإعراب", q: "علامة رفع (أبوك يساعدُك): 'يساعدُك' فعل مضارع مرفوع بـ:", options: ["الضمة الظاهرة", "الواو", "ثبوت النون", "الألف"], correct: "الضمة الظاهرة" },
        { section: "الإعراب", q: "ما إعراب (تنجحا) في 'إن تدرسا تنجحا'؟", options: ["فعل جواب الشرط مجزوم بحذف النون", "مرفوع بثبوت النون", "منصوب بالفتحة", "فعل أمر"], correct: "فعل جواب الشرط مجزوم بحذف النون" },

        // --- القسم 4: استخرج من النص ---
        { section: "استخرج من النص", text: "يجب على الطالب أن يسعى للعلم، ولم يقصرْ في واجباته.", q: "استخرج مضارعاً منصوباً:", options: ["يسعى", "يقصر", "يجب", "الطالب"], correct: "يسعى" },
        { section: "استخرج من النص", text: "إن تنصروا الله ينصركم ويثبت أقدامكم.", q: "استخرج فعلاً من الأفعال الخمسة:", options: ["تنصروا", "ينصركم", "يثبت", "الله"], correct: "تنصروا" },
        { section: "استخرج من النص", text: "لا تنسَ ذكر الله في كل وقت.", q: "الفعل (تنس) مجزوم بـ (لا الناهية) وعلامة جزمه:", options: ["حذف حرف العلة", "السكون", "الفتحة", "حذف النون"], correct: "حذف حرف العلة" },
        { section: "استخرج من النص", text: "المعلمون يخلصون في العمل ولن يتوانوا عن العطاء.", q: "استخرج مضارعاً مجزوماً أو منصوباً بحذف النون:", options: ["يتوانوا", "يخلصون", "المعلمون", "العطاء"], correct: "يتوانوا" },
        { section: "استخرج من النص", text: "من يتقِ الله يجعل له مخرجاً.", q: "استخرج فعل الشرط:", options: ["يتقِ", "يجعل", "يتقي", "مخرجاً"], correct: "يتقِ" },
        { section: "استخرج من النص", text: "أنتِ ترسمين اللوحة ببراعة.", q: "الفعل (ترسمين) مرفوع لأنه:", options: ["من الأفعال الخمسة", "صحيح الآخر", "معتل الآخر", "مسبوق بناصب"], correct: "من الأفعال الخمسة" },

        // --- القسم 5: اختر الجواب الصحيح ---
        { section: "اختر الجواب الصحيح", q: "أي من الأدوات التالية تجزم فعلين مضارعين؟", options: ["مَنْ", "لَمْ", "لَنْ", "لام الأمر"], correct: "مَنْ" },
        { section: "اختر الجواب الصحيح", q: "ما هو الفعل المعتل الآخر بالألف؟", options: ["يخشى", "يمشي", "يغزو", "يكتب"], correct: "يخشى" },
        { section: "اختر الجواب الصحيح", q: "الأفعال الخمسة هي كل مضارع اتصلت به:", options: ["واو الجماعة، ألف الاثنين، ياء المخاطبة", "تاء الفاعل، نون النسوة", "كاف الخطاب، هاء الغيبة", "واو الجماعة فقط"], correct: "واو الجماعة، ألف الاثنين، ياء المخاطبة" },
        { section: "اختر الجواب الصحيح", q: "علامة جزم الفعل المضارع (صحيح الآخر) هي:", options: ["السكون", "حذف حرف العلة", "حذف النون", "الكسرة"], correct: "السكون" },
        { section: "اختر الجواب الصحيح", q: "أداة الشرط (مَا) تستخدم لـ:", options: ["غير العاقل", "العاقل", "الزمان", "المكان"], correct: "غير العاقل" },
        { section: "اختر الجواب الصحيح", q: "ينصب المضارع المعتل الآخر بالألف بفتحة:", options: ["مقدرة للتعذر", "ظاهرة", "مقدرة للثقل", "حذف حرف العلة"], correct: "مقدرة للتعذر" },

        // --- القسم 6: الصح والخطأ ---
        { section: "الصح والخطأ", q: "علامة رفع الأفعال الخمسة هي الواو.", options: ["صح", "خطأ"], correct: "خطأ" },
        { section: "الصح والخطأ", q: "الفعل المضارع يبدأ دائماً بأحد حروف كلمة (نأتي).", options: ["صح", "خطأ"], correct: "صح" },
        { section: "الصح والخطأ", q: "(لم) أداة جزم، بينما (لن) أداة نصب.", options: ["صح", "خطأ"], correct: "صح" },
        { section: "الصح والخطأ", q: "يجزم الفعل المعتل الآخر بالسكون.", options: ["صح", "خطأ"], correct: "خطأ" },
        { section: "الصح والخطأ", q: "إذا اتصلت (ياء المخاطبة) بالمضارع أصبح من الأفعال الخمسة.", options: ["صح", "خطأ"], correct: "صح" },
        { section: "الصح والخطأ", q: "(إذا) أداة شرط جازمة.", options: ["صح", "خطأ"], correct: "خطأ" }
    ];

    let currentQ = 0;
    let score = 0;
    let timerInterval;
    let quizData = [];

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function startQuiz() {
        if (!document.getElementById('student-name').value) { alert("لطفاً، سجل اسمك الثلاثي لتبدأ!"); return; }
        quizData = shuffleArray([...rawData]); 
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('quiz-section').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = quizData[currentQ];
        document.getElementById('q-progress').innerText = `سؤال ${currentQ + 1} من ${quizData.length}`;
        document.getElementById('section-label').innerText = q.section;
        
        const readingBox = document.getElementById('reading-container');
        if (q.text) { readingBox.innerText = q.text; readingBox.classList.remove('hidden'); } 
        else { readingBox.classList.add('hidden'); }

        document.getElementById('question-text').innerText = q.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        document.getElementById('feedback').innerText = '';

        const currentOpts = shuffleArray([...q.options]);
        currentOpts.forEach((opt) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, opt === q.correct, q.correct);
            container.appendChild(btn);
        });
        startTimer();
    }

    function startTimer() {
        let timeLeft = 45;
        clearInterval(timerInterval);
        const timerBar = document.getElementById('timer-bar');
        const timerText = document.getElementById('timer-text');
        
        timerInterval = setInterval(() => {
            timeLeft--;
            timerText.innerText = `الوقت المتبقي: ${timeLeft}`;
            timerBar.style.width = `${(timeLeft / 45) * 100}%`;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                disableOptions();
                highlightCorrect(quizData[currentQ].correct);
                document.getElementById('feedback').innerHTML = "<span style='color:orange'>انتهى الوقت! ركز أكثر في القادم ⏳</span>";
                setTimeout(nextQuestion, 3000);
            }
        }, 1000);
    }

    function checkAnswer(btn, isCorrect, correctText) {
        clearInterval(timerInterval);
        disableOptions();
        if (isCorrect) {
            score++;
            btn.classList.add('correct-flash');
            document.getElementById('feedback').innerHTML = "<span style='color:green'>إجابة متميزة! أحسنت ✨</span>";
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        } else {
            btn.classList.add('wrong-flash');
            highlightCorrect(correctText);
            document.getElementById('feedback').innerHTML = "<span style='color:red'>ليست دقيقة، الصواب بالأخضر ✅</span>";
        }
        setTimeout(nextQuestion, 3500);
    }

    function highlightCorrect(correctText) {
        document.querySelectorAll('.option-btn').forEach(b => {
            if (b.innerText === correctText) b.classList.add('correct-flash');
        });
    }

    function disableOptions() {
        document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
    }

    function nextQuestion() {
        currentQ++;
        if (currentQ < quizData.length) { showQuestion(); } 
        else { finishQuiz(); }
    }

    function finishQuiz() {
        document.getElementById('quiz-section').classList.add('hidden');
        document.getElementById('result-section').classList.remove('hidden');
        document.getElementById('final-score').innerText = `${score} / ${quizData.length}`;
        
        let eval = "";
        if (score === 36) eval = "أنت نابغة لغوي! درجة كاملة مستحقة 🏆";
        else if (score >= 30) eval = "مستوى رائع جداً.. واصل تألقك 🌟";
        else if (score >= 18) eval = "أداء جيد، يمكنك أن تصبح أفضل مع الممارسة 💪";
        else eval = "محاولة لا بأس بها، تحدَّ نفسك مرة أخرى بتركيز أكبر!";
        
        document.getElementById('evaluation-text').innerText = eval;
    }
</script>
</body>
</html>
